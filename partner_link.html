<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Переход в Telegram | SAFE</title>
    <meta name="description" content="Быстрый переход в Telegram-бот SAFE" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta property="og:title" content="Переход в Telegram | SAFE" />
    <meta property="og:description" content="Быстрый переход в Telegram-бот SAFE" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://exchangemoneyt.com/partner_link" />
    <meta property="og:site_name" content="SAFE" />

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="apple-touch-icon" href="assets/favicon.svg" />
    <link rel="stylesheet" href="styles.css?v=20260409-2" />
  </head>
  <body class="page page--partner-link">
    <main
      class="partner-redirect"
      data-go-bot-page
      data-go-bot-force-redirect="true"
      data-go-bot-redirect-delay-ms="3000"
      data-go-bot-ready-text="Переходим в Telegram через несколько секунд..."
      data-go-bot-missing-text="Переходим в Telegram через несколько секунд..."
      data-go-bot-redirect-text="Переходим в Telegram через несколько секунд..."
    >
      <div class="partner-redirect__ambient partner-redirect__ambient--one" aria-hidden="true"></div>
      <div class="partner-redirect__ambient partner-redirect__ambient--two" aria-hidden="true"></div>

      <section class="partner-redirect__card" aria-live="polite">
        <a class="partner-redirect__brand" href="/" aria-label="SAFE">
          <img src="assets/safe-logo.svg" alt="SAFE" />
        </a>

        <h1 class="partner-redirect__title">Открываем Telegram-бота</h1>
        <p class="partner-redirect__status" data-go-bot-status>Готовим безопасный переход...</p>

        <div class="bot-redirect-timer partner-redirect__timer" data-partner-link-timer>
          <svg class="bot-redirect-timer__svg" viewBox="0 0 120 120" role="presentation" aria-hidden="true">
            <circle class="bot-redirect-timer__track" cx="60" cy="60" r="50"></circle>
            <circle
              class="bot-redirect-timer__progress"
              cx="60"
              cy="60"
              r="50"
              data-partner-link-ring
            ></circle>
          </svg>
          <div class="bot-redirect-timer__value" data-partner-link-seconds>3</div>
        </div>

        <p class="partner-redirect__countdown">
          Автопереход через <span data-partner-link-seconds-inline>3</span> сек.
        </p>

        <div class="partner-redirect__actions">
          <a
            class="partner-redirect__cta btn btn--size-cta btn--outline-light"
            data-go-bot-link
            href="https://r.bothelp.io/tg?domain=safe_exchange_money_bot&start=c1774877924856-ds"
            target="_blank"
            rel="noopener noreferrer"
          >
            Перейти сейчас
          </a>
        </div>
      </section>
    </main>

    <script src="site.config.js?v=20260409-1"></script>
    <script src="partner-tracking.js?v=20260409-1"></script>
    <script>
      (function () {
        'use strict';

        var pageRoot = document.querySelector('[data-go-bot-page]');
        if (!pageRoot) {
          return;
        }

        var rawDelay = Number(pageRoot.getAttribute('data-go-bot-redirect-delay-ms'));
        var totalMs = Number.isFinite(rawDelay) && rawDelay >= 300 ? rawDelay : 3000;

        var ringNode = document.querySelector('[data-partner-link-ring]');
        var secondsNodes = document.querySelectorAll('[data-partner-link-seconds], [data-partner-link-seconds-inline]');
        var timerCircumference = 314.1592653589793;
        var startTs = Date.now();

        function render(remainingMs) {
          var safeRemaining = Math.max(0, Math.min(totalMs, remainingMs));
          var progress = 1 - safeRemaining / totalMs;

          if (ringNode) {
            ringNode.style.strokeDasharray = String(timerCircumference);
            ringNode.style.strokeDashoffset = String(timerCircumference * progress);
          }

          var secondsLeft = Math.max(0, Math.ceil(safeRemaining / 1000));
          for (var i = 0; i < secondsNodes.length; i += 1) {
            var node = secondsNodes[i];
            var nextValue = String(secondsLeft);
            if (node.textContent !== nextValue) {
              node.textContent = nextValue;
            }
          }
        }

        render(totalMs);

        var tickInterval = window.setInterval(function () {
          var elapsedMs = Date.now() - startTs;
          var remainingMs = Math.max(0, totalMs - elapsedMs);
          render(remainingMs);

          if (remainingMs <= 0) {
            window.clearInterval(tickInterval);
          }
        }, 100);
      })();
    </script>
  </body>
</html>
