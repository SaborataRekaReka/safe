name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - bot_secret_name: TELEGRAM_BOT_TOKEN
            chat_secret_name: TELEGRAM_CHAT_ID
            proxy_secret_name: TELEGRAM_PROXY

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            cat > .lead-secrets.php <<'PHP'
            <?php
            return [
              'telegram_bot_token' => '${{ secrets[matrix.bot_secret_name] }}',
              'telegram_chat_id' => '${{ secrets[matrix.chat_secret_name] }}',
              'telegram_proxy' => '${{ secrets[matrix.proxy_secret_name] }}'
            ];
            PHP
            chmod 644 .lead-secrets.php
